name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild shared dependencies for lint resolution
        run: npx turbo run build --filter=@logx/shared --filter=@logx/i18n

      - name: Lint
        run: npx turbo run lint --filter=@logx/api... --filter=@logx/web...

      - name: Type check
        run: npx turbo run type-check --filter=@logx/api... --filter=@logx/web...

      - name: Build
        run: npx turbo run build --filter=@logx/api... --filter=@logx/web...

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
