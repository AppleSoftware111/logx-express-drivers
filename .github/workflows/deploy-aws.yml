name: Deploy AWS (Web + API)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE_API: ${{ vars.ECS_SERVICE_API }}
  ECS_SERVICE_WEB: ${{ vars.ECS_SERVICE_WEB }}
  ECS_CONTAINER_API: ${{ vars.ECS_CONTAINER_API || 'api' }}
  ECS_CONTAINER_WEB: ${{ vars.ECS_CONTAINER_WEB || 'web' }}
  ECR_REPOSITORY_API: ${{ vars.ECR_REPOSITORY_API || 'logx-api' }}
  ECR_REPOSITORY_WEB: ${{ vars.ECR_REPOSITORY_WEB || 'logx-web' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME || 'my-website-bucket' }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || 'ECN1RSCDU3H3U' }}

jobs:
  deploy:
    name: Build, push and deploy ECS services
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: build-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          API_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG"
          docker build -f apps/api/Dockerfile -t "$API_IMAGE" .
          docker push "$API_IMAGE"
          echo "image=$API_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push Web image
        id: build-web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          WEB_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG"
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_KEY="$NEXT_PUBLIC_GOOGLE_MAPS_KEY" \
            -t "$WEB_IMAGE" .
          docker push "$WEB_IMAGE"
          echo "image=$WEB_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy API service
        env:
          NEW_IMAGE: ${{ steps.build-api.outputs.image }}
        run: |
          set -euo pipefail
          SERVICE_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition --task-definition "$SERVICE_TASK_DEF_ARN" \
            --query 'taskDefinition' > task-def-api.json

          cat task-def-api.json | jq --arg IMAGE "$NEW_IMAGE" --arg NAME "$ECS_CONTAINER_API" '
            .containerDefinitions = (.containerDefinitions | map(
              if .name == $NAME then .image = $IMAGE else . end
            )) |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' > task-def-api-updated.json

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-def-api-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_API" \
            --task-definition "$NEW_TASK_DEF_ARN"

      - name: Deploy Web service
        env:
          NEW_IMAGE: ${{ steps.build-web.outputs.image }}
        run: |
          set -euo pipefail
          SERVICE_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WEB" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition --task-definition "$SERVICE_TASK_DEF_ARN" \
            --query 'taskDefinition' > task-def-web.json

          cat task-def-web.json | jq --arg IMAGE "$NEW_IMAGE" --arg NAME "$ECS_CONTAINER_WEB" '
            .containerDefinitions = (.containerDefinitions | map(
              if .name == $NAME then .image = $IMAGE else . end
            )) |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' > task-def-web-updated.json

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-def-web-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_WEB" \
            --task-definition "$NEW_TASK_DEF_ARN"

      - name: Wait for services to stabilize
        run: |
          set -euo pipefail
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_API"
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_WEB"

      - name: Invalidate CloudFront cache
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
