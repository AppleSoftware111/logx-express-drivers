name: Deploy AWS (Web + API)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE_API: ${{ vars.ECS_SERVICE_API }}
  ECS_SERVICE_WEB: ${{ vars.ECS_SERVICE_WEB }}
  ECS_CONTAINER_API: ${{ vars.ECS_CONTAINER_API || 'api' }}
  ECS_CONTAINER_WEB: ${{ vars.ECS_CONTAINER_WEB || 'web' }}
  ECR_REPOSITORY_API: ${{ vars.ECR_REPOSITORY_API || 'logx-api' }}
  ECR_REPOSITORY_WEB: ${{ vars.ECR_REPOSITORY_WEB || 'logx-web' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
  NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
  FRONTEND_URL: ${{ vars.FRONTEND_URL }}
  CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
  APP_TIMEZONE: ${{ vars.APP_TIMEZONE || 'America/Sao_Paulo' }}
  ECS_HEALTH_GRACE_PERIOD_WEB: ${{ vars.ECS_HEALTH_GRACE_PERIOD_WEB || '120' }}
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME || 'my-website-bucket' }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || 'ECN1RSCDU3H3U' }}

jobs:
  changes:
    name: Detect deploy scope
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - '.github/workflows/deploy-aws.yml'
              - '.dockerignore'
              - 'package.json'
              - 'package-lock.json'
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'packages/i18n/**'
              - 'packages/tsconfig/**'
            web:
              - '.github/workflows/deploy-aws.yml'
              - '.dockerignore'
              - 'package.json'
              - 'package-lock.json'
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'packages/i18n/**'
              - 'packages/tsconfig/**'

  deploy-api:
    name: Build and deploy API
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API }}:${{ github.sha }}
          cache-from: type=gha,scope=deploy-api
          cache-to: type=gha,mode=max,scope=deploy-api

      - name: Deploy API service
        env:
          NEW_IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API }}:${{ github.sha }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail
          SERVICE_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition --task-definition "$SERVICE_TASK_DEF_ARN" \
            --query 'taskDefinition' > task-def-api.json

          jq \
            --arg IMAGE "$NEW_IMAGE" \
            --arg NAME "$ECS_CONTAINER_API" \
            --arg MONGODB_URI "$MONGODB_URI" \
            --arg REDIS_URL "$REDIS_URL" \
            --arg JWT_SECRET "$JWT_SECRET" \
            --arg JWT_REFRESH_SECRET "$JWT_REFRESH_SECRET" \
            --arg FRONTEND_URL "$FRONTEND_URL" \
            --arg CORS_ORIGINS "$CORS_ORIGINS" \
            --arg APP_TIMEZONE "$APP_TIMEZONE" \
            '
            def merge_env($patch):
              (((.environment // []) | map({key: .name, value: .value}) | from_entries) + $patch)
              | to_entries
              | map({name: .key, value: (.value | tostring)});
            .containerDefinitions = (.containerDefinitions | map(
              if .name == $NAME then
                .image = $IMAGE |
                .environment = merge_env({
                  "NODE_ENV": "production",
                  "MONGODB_URI": $MONGODB_URI,
                  "REDIS_URL": $REDIS_URL,
                  "JWT_SECRET": $JWT_SECRET,
                  "JWT_REFRESH_SECRET": $JWT_REFRESH_SECRET,
                  "FRONTEND_URL": $FRONTEND_URL,
                  "CORS_ORIGINS": $CORS_ORIGINS,
                  "APP_TIMEZONE": $APP_TIMEZONE
                })
              else . end
            )) |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            ' task-def-api.json > task-def-api-updated.json

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-def-api-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_API" \
            --task-definition "$NEW_TASK_DEF_ARN"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API"

  deploy-web:
    name: Build and deploy Web
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          provenance: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_KEY=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WEB }}:${{ github.sha }}
          cache-from: type=gha,scope=deploy-web
          cache-to: type=gha,mode=max,scope=deploy-web

      - name: Deploy Web service
        env:
          NEW_IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WEB }}:${{ github.sha }}
        run: |
          set -euo pipefail
          SERVICE_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WEB" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition --task-definition "$SERVICE_TASK_DEF_ARN" \
            --query 'taskDefinition' > task-def-web.json

          jq \
            --arg IMAGE "$NEW_IMAGE" \
            --arg NAME "$ECS_CONTAINER_WEB" \
            '
            def merge_env($patch):
              (((.environment // []) | map({key: .name, value: .value}) | from_entries) + $patch)
              | to_entries
              | map({name: .key, value: (.value | tostring)});
            .containerDefinitions = (.containerDefinitions | map(
              if .name == $NAME then
                .image = $IMAGE |
                .environment = merge_env({
                  "NODE_ENV": "production"
                })
              else . end
            )) |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            ' task-def-web.json > task-def-web-updated.json

          NEW_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-def-web-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_WEB" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --health-check-grace-period-seconds "$ECS_HEALTH_GRACE_PERIOD_WEB"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WEB"

  smoke-test:
    name: Smoke test deployed services
    needs: [changes, deploy-api, deploy-web]
    if: ${{ always() && (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true') && needs.deploy-api.result != 'failure' && needs.deploy-web.result != 'failure' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Smoke test deployed services
        run: |
          set -euo pipefail

          if [ "${{ needs.changes.outputs.api }}" = "true" ]; then
            curl --fail --retry 5 --retry-delay 10 --retry-connrefused \
              "${NEXT_PUBLIC_API_URL%/}/health"
          fi

          if [ "${{ needs.changes.outputs.web }}" = "true" ]; then
            curl --fail --retry 5 --retry-delay 10 --retry-connrefused \
              "${FRONTEND_URL%/}/api/health"

            curl --fail --retry 5 --retry-delay 10 --retry-connrefused \
              "${FRONTEND_URL%/}/login"
          fi

  invalidate-cloudfront:
    name: Invalidate CloudFront cache
    needs: [changes, deploy-web, smoke-test]
    if: ${{ needs.changes.outputs.web == 'true' && needs.deploy-web.result == 'success' && needs.smoke-test.result == 'success' && env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
